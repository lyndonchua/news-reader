<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>News Reader</title>
<style>
:root{
  --bg:#f3f5f8;--panel:#ffffff;--panel2:#f8fafc;--text:#172033;--muted:#687386;--line:#e2e8f0;
  --accent:#2563eb;--accent2:#dbeafe;--shadow:0 12px 35px rgba(15,23,42,.08);--radius:22px;--readerSize:15px;
}
.dark{--bg:#0b1120;--panel:#111827;--panel2:#182235;--text:#e5e7eb;--muted:#9ca3af;--line:#263447;--accent:#60a5fa;--accent2:#1e3a5f;--shadow:0 12px 35px rgba(0,0,0,.28)}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif} button,input,select{font:inherit}
.lock{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#0f172a,#1d4ed8)}
.lockBox{width:min(420px,100%);background:white;color:#111827;border-radius:26px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.28)}
.lockBox h1{margin:0 0 8px;font-size:28px}.lockBox p{color:#64748b}.lockBox input{width:100%;padding:14px;border:1px solid #d1d5db;border-radius:15px;margin:12px 0}.lockBox button,.primary{background:#2563eb;color:white;border:0;border-radius:15px;padding:13px 16px;font-weight:800;cursor:pointer}.hidden{display:none!important}
.app{height:100vh;display:grid;grid-template-rows:auto 1fr}.top{padding:16px 22px;background:rgba(255,255,255,.75);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}.dark .top{background:rgba(17,24,39,.75)}
.topInner{max-width:1500px;margin:auto;display:flex;gap:14px;align-items:center;justify-content:space-between}.brand h1{font-size:22px;margin:0}.brand div{font-size:13px;color:var(--muted);margin-top:3px}.actions{display:flex;gap:8px;flex-wrap:wrap}.pillBtn{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:999px;padding:9px 13px;cursor:pointer;font-weight:700}.pillBtn.active{background:var(--accent);border-color:var(--accent);color:white}
.layout{max-width:1500px;margin:0 auto;width:100%;height:100%;display:grid;grid-template-columns:390px 1fr;gap:18px;padding:18px;overflow:hidden}.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);min-height:0}.sidebar{display:grid;grid-template-rows:auto auto 1fr;overflow:hidden}.filters{padding:16px;border-bottom:1px solid var(--line)}
.search{width:100%;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:16px;padding:13px 14px;outline:none}.filterRow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}.filterRow input,.filterRow select{min-width:0;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:14px;padding:10px}.stats{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line);color:var(--muted);font-size:13px;align-items:center;justify-content:space-between}
.list{overflow:auto;padding:10px}.item{border:1px solid transparent;border-radius:18px;padding:13px 14px;margin-bottom:9px;cursor:pointer;background:var(--panel2)}.item:hover{border-color:var(--accent)}.item.active{background:var(--accent2);border-color:var(--accent)}.itemTitle{font-weight:850;line-height:1.25}.itemMeta{font-size:12px;color:var(--muted);margin-top:7px;display:flex;gap:8px;flex-wrap:wrap}.tagLine{margin-top:8px;display:flex;gap:5px;flex-wrap:wrap}.tag{font-size:11px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:4px 8px;color:var(--muted)}
.reader{overflow:auto;position:relative}.empty{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);padding:40px}.articleShell{max-width:920px;margin:0 auto;padding:34px 42px 60px}.sourceRow{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:14px;align-items:center}.articleTitle{font-size:42px;line-height:1.08;letter-spacing:-1.4px;margin:14px 0 18px}.openLink{color:var(--accent);font-weight:800;text-decoration:none}.summary{background:var(--panel2);border:1px solid var(--line);border-left:5px solid var(--accent);border-radius:18px;padding:18px;line-height:1.65;margin:20px 0 18px;white-space:pre-wrap}.toolStrip{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 22px}.articleText{font-family:Georgia,'Times New Roman',serif;font-size:var(--readerSize);line-height:1.82;white-space:pre-wrap;letter-spacing:.01em}.articleText p{margin:0 0 1.05em}.keywords{display:flex;gap:7px;flex-wrap:wrap;margin:18px 0}.keyword{border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:7px 10px;border-radius:999px;font-size:13px;cursor:pointer}.keyword:hover{border-color:var(--accent);color:var(--accent)}
.scrollTopBtn{position:fixed;right:24px;bottom:24px;z-index:99999;display:block!important;visibility:visible!important;opacity:1!important;border:0;background:var(--accent);color:white;border-radius:999px;padding:12px 16px;font-weight:900;box-shadow:0 14px 32px rgba(15,23,42,.22);cursor:pointer}
.scrollTopBtn:hover{filter:brightness(1.05)}
.mobileArticleBtn{display:none}.filterToggle{display:none}.loading{padding:18px;color:var(--muted)}
@media(max-width:900px){
  .app{height:auto;min-height:100vh;display:block}
  .top{position:relative;padding:12px 14px}
  .topInner{align-items:flex-start;flex-direction:column;gap:10px}
  .brand h1{font-size:24px}.brand div{font-size:13px}
  .actions{gap:7px}.pillBtn{padding:8px 11px;font-size:14px}
  .layout{height:auto;display:block;overflow:visible;padding:10px}
  .sidebar{height:auto;max-height:none;margin-bottom:12px;display:block;overflow:visible}
  .filters{padding:10px}.search{padding:11px 12px;border-radius:14px}
  .filterToggle{display:block;width:100%;margin-top:8px;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:14px;padding:10px 12px;font-weight:800;text-align:left}
  .filterOptions{display:none}.filterOptions.open{display:block}
  .filterRow{grid-template-columns:1fr;gap:7px;margin-top:7px}.filterRow input,.filterRow select{padding:9px;border-radius:12px}
  .stats{padding:9px 12px;font-size:13px}
  .list{max-height:38vh;overflow:auto;padding:8px}.item{padding:11px 12px;margin-bottom:8px;border-radius:15px}.itemTitle{font-size:15px}.itemMeta{font-size:11px}.tagLine{display:none}
  .reader{min-height:55vh;overflow:visible}.articleShell{padding:22px 16px 44px}.articleTitle{font-size:28px;letter-spacing:-.6px}.summary{padding:14px;font-size:15px}.articleText{line-height:1.75}
  .mobileArticleBtn{display:inline-flex}
  .scrollTopBtn{right:14px;bottom:14px;padding:11px 14px;font-size:14px}
}
</style>
</head>
<body>
<div id="lock" class="lock"><div class="lockBox"><h1>News Reader</h1><p>Reader-only access to your Firebase news article bank.</p><input id="passcode" type="password" placeholder="Passcode" onkeydown="if(event.key==='Enter')unlock()"><button class="primary" onclick="unlock()">Unlock</button><p id="passErr" style="color:#dc2626;font-weight:700"></p></div></div>
<div id="app" class="app hidden">
  <header class="top"><div class="topInner"><div class="brand"><h1>News Reader</h1><div>Cleaner, reader-friendly view of saved Firebase articles</div></div><div class="actions"><button class="pillBtn" onclick="setFont(-1)">A−</button><button class="pillBtn" onclick="setFont(1)">A+</button><button id="summaryToggle" class="pillBtn active" onclick="toggleSummary()">Summary On</button><button class="pillBtn" onclick="toggleTheme()">Dark / Light</button><button class="pillBtn" onclick="clearFilters()">Clear Filters</button><button class="pillBtn" onclick="scrollToTop()">Top ↑</button></div></div></header>
  <main class="layout">
    <section class="panel sidebar">
      <div class="filters">
        <input id="search" class="search" placeholder="Search articles..." oninput="renderList()">
        <button id="mobileFilterToggle" class="filterToggle" onclick="toggleMobileFilters()">Show filters</button>
        <div id="filterOptions" class="filterOptions">
          <div class="filterRow"><select id="source" onchange="renderList()"><option value="">All sources</option></select><select id="sort" onchange="renderList()"><option value="newest">Newest first</option><option value="oldest">Oldest first</option><option value="title">Title A–Z</option></select></div>
          <div class="filterRow"><input id="from" type="date" onchange="renderList()"><input id="to" type="date" onchange="renderList()"></div>
        </div>
      </div>
      <div class="stats"><span id="count">Loading...</span><span id="activeFilter"></span></div>
      <div id="list" class="list"><div class="loading">Loading articles from Firebase...</div></div>
    </section>
    <article id="reader" class="panel reader"><div class="empty"><div><h2>Select an article</h2><p>Click any article on the left to read it comfortably.</p></div></div></article>
  </main>
  <button id="scrollTopBtn" class="scrollTopBtn" onclick="scrollToTop()">Top ↑</button>
</div>
<script>
const APP_PASSCODE="7728";
function unlock(){const v=document.getElementById('passcode').value.trim();if(v===APP_PASSCODE){sessionStorage.setItem('newsReaderUnlocked','yes');document.getElementById('lock').classList.add('hidden');document.getElementById('app').classList.remove('hidden');startApp()}else document.getElementById('passErr').textContent='Wrong passcode.'}
if(sessionStorage.getItem('newsReaderUnlocked')==='yes'){document.getElementById('lock').classList.add('hidden');document.getElementById('app').classList.remove('hidden')}
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyAotyw1bpKRESwzR2b0j19Qn1b81FrI6Bk",authDomain:"news-article-compiler.firebaseapp.com",projectId:"news-article-compiler",storageBucket:"news-article-compiler.firebasestorage.app",messagingSenderId:"1042649880387",appId:"1:1042649880387:web:d5ef710d64f19acdd601f6"};
const app=initializeApp(firebaseConfig), db=getFirestore(app), ARTICLES_COLLECTION="newsArticles";
let articles=[],selectedId="",summaryOn=true,keywordFilter="",started=false;
window.startApp=async function(){if(started)return;started=true;await loadArticles()};
if(sessionStorage.getItem('newsReaderUnlocked')==='yes')window.startApp();
window.renderList=renderList;window.openArticle=openArticle;window.clearFilters=clearFilters;window.toggleTheme=toggleTheme;window.setFont=setFont;window.toggleSummary=toggleSummary;window.filterTag=filterTag;window.toggleMobileFilters=toggleMobileFilters;window.scrollToTop=scrollToTop;
function toggleMobileFilters(){const box=document.getElementById('filterOptions'),btn=document.getElementById('mobileFilterToggle');box.classList.toggle('open');btn.textContent=box.classList.contains('open')?'Hide filters':'Show filters'}
function scrollToTop(){const reader=document.getElementById('reader');if(reader&&reader.scrollTo)reader.scrollTo({top:0,behavior:'smooth'});window.scrollTo({top:0,behavior:'smooth'})}
async function loadArticles(){try{const snap=await getDocs(query(collection(db,ARTICLES_COLLECTION),orderBy('publicationDate','desc')));articles=snap.docs.map(d=>({id:d.id,...d.data()}));fillSources();renderList();if(articles[0])openArticle(articles[0].id)}catch(e){document.getElementById('list').innerHTML='<div class="loading">Could not load Firebase articles. '+esc(e.message)+'</div>';document.getElementById('count').textContent='Load failed'}}
function fillSources(){const sources=[...new Set(articles.map(a=>a.source).filter(Boolean))].sort();document.getElementById('source').innerHTML='<option value="">All sources</option>'+sources.map(s=>`<option value="${escAttr(s)}">${esc(s)}</option>`).join('')}
function filtered(){const q=document.getElementById('search').value.trim().toLowerCase(),source=document.getElementById('source').value,from=document.getElementById('from').value,to=document.getElementById('to').value;let arr=articles.filter(a=>{const hay=[a.title,a.source,a.publicationDate,a.summary,a.fullArticle,a.fullArticleRaw,(a.keywords||[]).join(' '),(a.economicKeywords||[]).join(' '),(a.economicsConcepts||[]).join(' ')].join(' ').toLowerCase();const d=a.publicationDate||'';const tags=[...(a.keywords||[]),...(a.economicKeywords||[]),...(a.economicsConcepts||[])].map(x=>String(x).toLowerCase());return (!q||hay.includes(q))&&(!source||a.source===source)&&(!from||(d&&d>=from))&&(!to||(d&&d<=to))&&(!keywordFilter||tags.includes(keywordFilter.toLowerCase()))});const sort=document.getElementById('sort').value;if(sort==='oldest')arr.sort((a,b)=>(a.publicationDate||'').localeCompare(b.publicationDate||''));else if(sort==='title')arr.sort((a,b)=>(a.title||'').localeCompare(b.title||''));else arr.sort((a,b)=>(b.publicationDate||'').localeCompare(a.publicationDate||''));return arr}
function renderList(){const arr=filtered();document.getElementById('count').textContent=`${arr.length} of ${articles.length} articles`;document.getElementById('activeFilter').textContent='';document.getElementById('list').innerHTML=arr.length?arr.map(a=>`<div class="item ${a.id===selectedId?'active':''}" onclick="openArticle('${a.id}')"><div class="itemTitle">${esc(a.title||'Untitled')}</div><div class="itemMeta"><span>${esc(a.source||'Unknown')}</span><span>•</span><span>${formatDate(a.publicationDate)}</span></div></div>`).join(''):'<div class="loading">No articles match your filters.</div>';if(selectedId&&!arr.some(a=>a.id===selectedId)){document.getElementById('reader').innerHTML='<div class="empty"><div><h2>No selected article</h2><p>Choose an article from the filtered list.</p></div></div>'}}
function openArticle(id){selectedId=id;const a=articles.find(x=>x.id===id);if(!a)return;const tags=[...(a.economicKeywords||[]),...(a.economicsConcepts||[]),...(a.keywords||[])];const body=paragraphs(a.fullArticle||a.fullArticleRaw||'No article text saved.');document.getElementById('reader').innerHTML=`<div class="articleShell"><div class="sourceRow"><strong>${esc(a.source||'Unknown source')}</strong><span>•</span><span>${formatDate(a.publicationDate)}</span>${a.url?`<span>•</span><a class="openLink" href="${escAttr(a.url)}" target="_blank">Open original</a>`:''}</div><h1 class="articleTitle">${esc(a.title||'Untitled')}</h1>${summaryOn?`<section class="summary"><strong>Summary</strong><br>${esc(a.summary||'No summary saved.').replace(/\n/g,'<br>')}</section>`:''}<div class="articleText">${body}</div></div>`;renderList();document.getElementById('reader').scrollTop=0}
function paragraphs(text){return esc(text).split(/\n{2,}/).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('')}
function filterTag(t){keywordFilter=t;renderList()}
function clearFilters(){['search','source','from','to'].forEach(id=>document.getElementById(id).value='');keywordFilter='';renderList()}
function toggleTheme(){document.body.classList.toggle('dark');localStorage.setItem('newsReaderTheme',document.body.classList.contains('dark')?'dark':'light')}
if(localStorage.getItem('newsReaderTheme')==='dark')document.body.classList.add('dark');
function setFont(delta){const root=document.documentElement;let size=parseInt(getComputedStyle(root).getPropertyValue('--readerSize'))||18;size=Math.max(15,Math.min(24,size+delta));root.style.setProperty('--readerSize',size+'px')}
function toggleSummary(){summaryOn=!summaryOn;document.getElementById('summaryToggle').classList.toggle('active',summaryOn);document.getElementById('summaryToggle').textContent=summaryOn?'Summary On':'Summary Off';if(selectedId)openArticle(selectedId)}
function formatDate(d){if(!d)return 'No date';const date=new Date(d+'T00:00:00');return isNaN(date)?d:date.toLocaleDateString('en-SG',{day:'2-digit',month:'short',year:'numeric'})}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function escAttr(s){return esc(s).replace(/'/g,'&#39;')}
</script>
</body>
</html>
